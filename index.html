<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>台风路径</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 极乐集团 */
        .floating-brand {
            position: absolute;
            bottom: 4px;
            left: 7px;
            z-index: 1001;
            pointer-events: none;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            line-height: 1.4;
            white-space: nowrap;
        }

        /* ============================================
           全局半透明斜向水印 - 全屏覆盖
           透明度 0.09
           ============================================ */
        .watermark-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
            overflow: hidden;
        }

        .watermark {
            position: absolute;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.09);
            transform: rotate(-25deg);
            letter-spacing: 4px;
            white-space: nowrap;
            user-select: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.015);
        }

        /* 44道水印 - 铺满全屏 */
        .watermark:nth-child(1) { top: 0%; left: -15%; }
        .watermark:nth-child(2) { top: 0%; left: 15%; }
        .watermark:nth-child(3) { top: 0%; left: 45%; }
        .watermark:nth-child(4) { top: 0%; left: 75%; }
        .watermark:nth-child(5) { top: 9%; left: -5%; }
        .watermark:nth-child(6) { top: 9%; left: 35%; }
        .watermark:nth-child(7) { top: 9%; left: 65%; }
        .watermark:nth-child(8) { top: 9%; left: 95%; }
        .watermark:nth-child(9) { top: 18%; left: -15%; }
        .watermark:nth-child(10) { top: 18%; left: 15%; }
        .watermark:nth-child(11) { top: 18%; left: 45%; }
        .watermark:nth-child(12) { top: 18%; left: 75%; }
        .watermark:nth-child(13) { top: 27%; left: -5%; }
        .watermark:nth-child(14) { top: 27%; left: 35%; }
        .watermark:nth-child(15) { top: 27%; left: 65%; }
        .watermark:nth-child(16) { top: 27%; left: 95%; }
        .watermark:nth-child(17) { top: 36%; left: -15%; }
        .watermark:nth-child(18) { top: 36%; left: 15%; }
        .watermark:nth-child(19) { top: 36%; left: 45%; }
        .watermark:nth-child(20) { top: 36%; left: 75%; }
        .watermark:nth-child(21) { top: 45%; left: -5%; }
        .watermark:nth-child(22) { top: 45%; left: 35%; }
        .watermark:nth-child(23) { top: 45%; left: 65%; }
        .watermark:nth-child(24) { top: 45%; left: 95%; }
        .watermark:nth-child(25) { top: 54%; left: -15%; }
        .watermark:nth-child(26) { top: 54%; left: 15%; }
        .watermark:nth-child(27) { top: 54%; left: 45%; }
        .watermark:nth-child(28) { top: 54%; left: 75%; }
        .watermark:nth-child(29) { top: 63%; left: -5%; }
        .watermark:nth-child(30) { top: 63%; left: 35%; }
        .watermark:nth-child(31) { top: 63%; left: 65%; }
        .watermark:nth-child(32) { top: 63%; left: 95%; }
        .watermark:nth-child(33) { top: 72%; left: -15%; }
        .watermark:nth-child(34) { top: 72%; left: 15%; }
        .watermark:nth-child(35) { top: 72%; left: 45%; }
        .watermark:nth-child(36) { top: 72%; left: 75%; }
        .watermark:nth-child(37) { top: 81%; left: -5%; }
        .watermark:nth-child(38) { top: 81%; left: 35%; }
        .watermark:nth-child(39) { top: 81%; left: 65%; }
        .watermark:nth-child(40) { top: 81%; left: 95%; }
        .watermark:nth-child(41) { top: 90%; left: -15%; }
        .watermark:nth-child(42) { top: 90%; left: 15%; }
        .watermark:nth-child(43) { top: 90%; left: 45%; }
        .watermark:nth-child(44) { top: 90%; left: 75%; }

        /* ============================================
           左上角位置信息（缩小版）
           ============================================ */
        .location-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1001;
            pointer-events: none;
            background: rgba(10, 22, 40, 0.92);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            min-width: 120px;
            max-width: 260px;
        }
        .location-info .label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin-bottom: 1px;
        }
        .location-info .address {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.3;
        }
        .location-info .loading {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 400;
        }
        .location-info .road {
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin-top: 1px;
        }
        .location-info .detail {
            color: rgba(255, 255, 255, 0.2);
            font-size: 9px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin-top: 2px;
        }
        .location-info .note {
            color: rgba(255, 255, 255, 0.15);
            font-size: 8px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin-top: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://tf.istrongcloud.com/release/index-gjdw2.html"></iframe>
        <div class="floating-brand">极乐集团</div>

        <!-- 全屏水印 -->
        <div class="watermark-container" id="watermarkContainer"></div>

        <div class="location-info" id="locationInfo">
            <div class="label">📍 当前位置</div>
            <div class="address" id="addressDisplay">
                <span class="loading">定位中...</span>
            </div>
            <div class="road" id="roadDisplay"></div>
            <div class="detail" id="detailDisplay"></div>
            <div class="note">⚠️ 基于网络IP定位，可能不精确</div>
        </div>
    </div>

    <script>
        // 用JS生成44道水印
        const container = document.getElementById('watermarkContainer');
        const rows = 11;
        const cols = 4;
        const total = rows * cols;
        
        for (let i = 0; i < total; i++) {
            const div = document.createElement('div');
            div.className = 'watermark';
            div.textContent = '极乐气象局 版权所有';
            
            const row = Math.floor(i / cols);
            const col = i % cols;
            
            const topPercent = row * 9;
            const leftPercent = col * 30 - 5;
            
            div.style.top = topPercent + '%';
            div.style.left = leftPercent + '%';
            
            container.appendChild(div);
        }
    </script>

    <script>
        const addressDisplay = document.getElementById('addressDisplay');
        const roadDisplay = document.getElementById('roadDisplay');
        const detailDisplay = document.getElementById('detailDisplay');

        // ============================================
        // 使用 IP 定位（不需要代理，不需要用户授权）
        // ⚠️ 注意：此定位基于网络IP地址，非GPS精确定位
        //    显示的位置可能与实际位置有偏差
        // ============================================

        function getLocationByIP() {
            addressDisplay.innerHTML = '<span class="loading">定位中...</span>';
            roadDisplay.textContent = '';
            detailDisplay.textContent = '';

            // 使用 ip-api.com 免费接口
            fetch('http://ip-api.com/json/', {
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('网络请求失败');
                return response.json();
            })
            .then(data => {
                if (data.status === 'success') {
                    // 构建地址：国家 省 市 区
                    let parts = [];
                    if (data.country) parts.push(data.country);
                    if (data.regionName) parts.push(data.regionName);
                    if (data.city) parts.push(data.city);
                    if (data.district) parts.push(data.district);
                    
                    let mainAddress = parts.join(' ') || '未知位置';
                    addressDisplay.textContent = mainAddress;
                    
                    // 显示运营商信息
                    roadDisplay.textContent = `📡 ${data.isp || '未知运营商'}`;
                    
                    // 显示坐标
                    detailDisplay.textContent = `经度 ${data.lon} | 纬度 ${data.lat}`;
                } else {
                    addressDisplay.textContent = '❌ 定位失败';
                    roadDisplay.textContent = 'IP 接口返回错误';
                    detailDisplay.textContent = '';
                }
            })
            .catch(error => {
                console.error('IP 定位请求失败:', error);
                addressDisplay.textContent = '❌ 定位服务不可用';
                roadDisplay.textContent = '请检查网络连接';
                detailDisplay.textContent = '';
            });
        }

        // 页面加载后自动定位
        getLocationByIP();

        // 手动刷新定位（在控制台执行 refreshLocation()）
        window.refreshLocation = function() {
            getLocationByIP();
        };
        console.log('💡 刷新定位: refreshLocation()');
        console.log('⚠️ 此定位基于网络IP，非GPS精确定位');
    </script>
</body>
</html>
