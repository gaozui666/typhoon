<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>台风路径</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 极乐集团 */
        .floating-brand {
            position: absolute;
            bottom: 4px;
            left: 4px;
            z-index: 999;
            pointer-events: none;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            line-height: 1.4;
            white-space: nowrap;
        }

        /* 左上角位置信息 - 精确到道路 */
        .location-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 999;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.15);
            min-width: 140px;
            max-width: 280px;
            transition: all 0.3s ease;
        }
        .location-info .label {
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .location-info .address {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }
        .location-info .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            font-weight: 400;
        }
        .location-info .detail {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            margin-top: 2px;
        }
        .location-info .road {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            margin-top: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://tf.istrongcloud.com/release/index-gjdw2.html"></iframe>
        <div class="floating-brand">极乐集团</div>

        <div class="location-info" id="locationInfo">
            <div class="label">📍 当前位置</div>
            <div class="address" id="addressDisplay">
                <span class="loading">定位中...</span>
            </div>
            <div class="road" id="roadDisplay"></div>
            <div class="detail" id="detailDisplay"></div>
        </div>
    </div>

    <script>
        const addressDisplay = document.getElementById('addressDisplay');
        const roadDisplay = document.getElementById('roadDisplay');
        const detailDisplay = document.getElementById('detailDisplay');

        // ============================================
        // 使用浏览器定位 + Nominatim 反向地理编码
        // 精确到道路
        // ============================================

        function getAddress(lat, lng) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&accept-language=zh`;

            return fetch(url, {
                headers: {
                    'User-Agent': 'TyphoonLocationApp/1.0'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data && data.display_name) {
                    return data;
                } else {
                    throw new Error('无法解析地址');
                }
            });
        }

        function formatAddress(data) {
            const addr = data.address || {};
            
            // 道路名
            let road = addr.road || addr.pedestrian || addr.path || '';
            
            // 区/县
            let district = addr.city_district || addr.district || addr.county || '';
            
            // 市
            let city = addr.city || addr.town || addr.municipality || '';
            
            // 省
            let state = addr.state || addr.province || '';
            
            // 国家
            let country = addr.country || '';

            // 如果道路名没有，尝试用 neighbourhood 或 suburb
            if (!road) {
                road = addr.neighbourhood || addr.suburb || addr.village || '';
            }

            // 构建显示地址：省 市 区 道路
            let parts = [];
            if (state) parts.push(state);
            if (city && city !== state) parts.push(city);
            if (district && district !== city) parts.push(district);
            
            let mainAddress = parts.join(' ');
            
            // 如果道路名存在，单独显示在 road 行
            let roadText = road || '';
            
            // 如果道路名和主地址重复，去掉重复部分
            if (roadText && mainAddress.includes(roadText)) {
                roadText = '';
            }

            // 详细坐标
            let detail = `经度 ${data.lon} | 纬度 ${data.lat}`;

            return {
                main: mainAddress || '未知位置',
                road: roadText,
                detail: detail,
                full: data.display_name || mainAddress
            };
        }

        // ============================================
        // 定位流程
        // ============================================

        function updateLocation(lat, lng) {
            addressDisplay.innerHTML = '<span class="loading">解析地址中...</span>';
            roadDisplay.textContent = '';
            detailDisplay.textContent = '';

            getAddress(lat, lng)
                .then(data => {
                    const formatted = formatAddress(data);
                    
                    // 显示主地址（省 市 区）
                    addressDisplay.textContent = formatted.main;
                    
                    // 显示道路名
                    if (formatted.road) {
                        roadDisplay.textContent = '🛤️ ' + formatted.road;
                    }
                    
                    // 显示坐标
                    detailDisplay.textContent = formatted.detail;
                })
                .catch(error => {
                    console.error('地址解析失败:', error);
                    // 降级方案：只显示坐标
                    addressDisplay.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    roadDisplay.textContent = '📍 已定位 (地址解析失败)';
                    detailDisplay.textContent = '请检查网络后刷新重试';
                });
        }

        // ============================================
        // 获取浏览器定位
        // ============================================

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    updateLocation(lat, lng);
                },
                function(err) {
                    let msg = '定位失败';
                    if (err.code === 1) msg = '❌ 用户拒绝位置权限';
                    else if (err.code === 2) msg = '❌ 位置服务不可用';
                    else if (err.code === 3) msg = '❌ 定位请求超时';
                    addressDisplay.textContent = msg;
                    roadDisplay.textContent = '请在浏览器中允许位置权限';
                    detailDisplay.textContent = '或使用 VPN/代理后重试';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            addressDisplay.textContent = '❌ 浏览器不支持定位';
            roadDisplay.textContent = '请使用 Chrome/Edge/Safari';
        }

        // ============================================
        // 手动定位（控制台调试用）
        // ============================================

        window.setMyLocation = function(lat, lng) {
            updateLocation(lat, lng);
        };

        console.log('💡 手动定位: setMyLocation(纬度, 经度)');
        console.log('💡 例如: setMyLocation(30.67, 104.06)');
    </script>
</body>
</html>
